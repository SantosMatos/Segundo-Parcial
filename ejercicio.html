        <main class="layout-ejercicio">

    <h2>Control de funcionamiento de las obras</h2>

    <p class="mensaje-instruccion">Ingrese la cantidad de obras que desea registrar.</p>


    <div class="panel-control">

        <label for="txtCantidadObras">Cantidad de obras:</label>

        <input type="number" id="txtCantidadObras" min="1">

        <button id="btnCantidad">Aceptar</button>

    </div>

    <hr>


    <div id="formularioObra">

        <h3 class="titulo-ej">Datos de la obra</h3>

        <label>Nombre</label>
        <input type="text" id="txtNombre">

        <label>Cantidad de luces móviles</label>
        <input type="number" id="txtLuces">

        <label>Horas de funcionamiento por día</label>
        <input type="number" id="txtHoras">

        <label>Consumo por hora de cada luz (kWh)</label>
        <input type="number" id="txtConsumo">

        <label>Costo por kWh</label>
        <input type="number" id="txtCosto">

        <br><br>

        <button id="btnIngresar">Ingresar obra</button>

    </div>

        <button id="btnCalcular">Calcular resultados</button>

        <button id="btnReiniciar">Reiniciar</button>


    <div id="resultado">

    </div>

</main>

        <footer>
            <p>&copy; Para contactarse escribir a <a href="mailto:rafael@artedigital.com">rafael@artedigital.com</a></p>
